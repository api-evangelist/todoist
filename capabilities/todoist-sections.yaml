naftiko: 1.0.0-alpha2
info:
  label: Todoist API — Sections
  description: 'Todoist API — Sections. 5 operations. Lead operation: List Sections. Self-contained Naftiko capability covering
    one Todoist business surface.'
  tags:
  - Todoist
  - Sections
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TODOIST_API_KEY: TODOIST_API_KEY
capability:
  consumes:
  - type: http
    namespace: todoist-sections
    baseUri: https://api.todoist.com/api/v1
    description: Todoist API — Sections business capability. Self-contained, no shared references.
    resources:
    - name: sections
      path: /sections
      operations:
      - name: listsections
        method: GET
        description: List Sections
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_id
          in: query
          type: string
      - name: createsection
        method: POST
        description: Create Section
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: sections-id
      path: /sections/{id}
      operations:
      - name: getsection
        method: GET
        description: Get Section
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: updatesection
        method: POST
        description: Update Section
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesection
        method: DELETE
        description: Delete Section
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.TODOIST_API_KEY}}'
  exposes:
  - type: rest
    namespace: todoist-sections-rest
    port: 8080
    description: REST adapter for Todoist API — Sections. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sections
      name: sections
      description: REST surface for sections.
      operations:
      - method: GET
        name: listsections
        description: List Sections
        call: todoist-sections.listsections
        with:
          project_id: rest.project_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsection
        description: Create Section
        call: todoist-sections.createsection
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sections/{id}
      name: sections-id
      description: REST surface for sections-id.
      operations:
      - method: GET
        name: getsection
        description: Get Section
        call: todoist-sections.getsection
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updatesection
        description: Update Section
        call: todoist-sections.updatesection
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesection
        description: Delete Section
        call: todoist-sections.deletesection
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: todoist-sections-mcp
    port: 9090
    transport: http
    description: MCP adapter for Todoist API — Sections. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-sections
      description: List Sections
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: todoist-sections.listsections
      with:
        project_id: tools.project_id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-section
      description: Create Section
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: todoist-sections.createsection
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-section
      description: Get Section
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: todoist-sections.getsection
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-section
      description: Update Section
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: todoist-sections.updatesection
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-section
      description: Delete Section
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: todoist-sections.deletesection
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
