  - type: http
    namespace: todoist-reminders
    baseUri: https://api.todoist.com/api/v1
    description: Todoist API — Reminders business capability. Self-contained, no shared references.
    resources:
    - name: reminders
      path: /reminders
      operations:
      - name: listreminders
        method: GET
        description: List Reminders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createreminder
        method: POST
        description: Create Reminder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: reminders-id
      path: /reminders/{id}
      operations:
      - name: getreminder
        method: GET
        description: Get Reminder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: deletereminder
        method: DELETE
        description: Delete Reminder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.TODOIST_API_KEY}}'
  exposes:
  - type: rest
    namespace: todoist-reminders-rest
    port: 8080
    description: REST adapter for Todoist API — Reminders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/reminders
      name: reminders
      description: REST surface for reminders.
      operations:
      - method: GET
        name: listreminders
        description: List Reminders
        call: todoist-reminders.listreminders
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createreminder
        description: Create Reminder
        call: todoist-reminders.createreminder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reminders/{id}
      name: reminders-id
      description: REST surface for reminders-id.
      operations:
      - method: GET
        name: getreminder
        description: Get Reminder
        call: todoist-reminders.getreminder
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletereminder
        description: Delete Reminder
        call: todoist-reminders.deletereminder
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: todoist-reminders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Todoist API — Reminders. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-reminders
      description: List Reminders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: todoist-reminders.listreminders
      outputParameters:
      - type: object
        mapping: $.
    - name: create-reminder
      description: Create Reminder
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: todoist-reminders.createreminder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-reminder
