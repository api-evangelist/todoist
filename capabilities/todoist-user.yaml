naftiko: 1.0.0-alpha2
info:
  label: Todoist API — User
  description: 'Todoist API — User. 2 operations. Lead operation: Get User. Self-contained Naftiko capability covering one
    Todoist business surface.'
  tags:
  - Todoist
  - User
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TODOIST_API_KEY: TODOIST_API_KEY
capability:
  consumes:
  - type: http
    namespace: todoist-user
    baseUri: https://api.todoist.com/api/v1
    description: Todoist API — User business capability. Self-contained, no shared references.
    resources:
    - name: user
      path: /user
      operations:
      - name: getuser
        method: GET
        description: Get User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-stats
      path: /user/stats
      operations:
      - name: getuserstats
        method: GET
        description: Get User Stats
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TODOIST_API_KEY}}'
  exposes:
  - type: rest
    namespace: todoist-user-rest
    port: 8080
    description: REST adapter for Todoist API — User. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/user
      name: user
      description: REST surface for user.
      operations:
      - method: GET
        name: getuser
        description: Get User
        call: todoist-user.getuser
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user/stats
      name: user-stats
      description: REST surface for user-stats.
      operations:
      - method: GET
        name: getuserstats
        description: Get User Stats
        call: todoist-user.getuserstats
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: todoist-user-mcp
    port: 9090
    transport: http
    description: MCP adapter for Todoist API — User. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-user
      description: Get User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: todoist-user.getuser
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user-stats
      description: Get User Stats
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: todoist-user.getuserstats
      outputParameters:
      - type: object
        mapping: $.
