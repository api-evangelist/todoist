  - FOCUS
description: 'FOCUS-aligned FinOps for Todoist: per-seat tiered SaaS subscription (Beginner free, Pro
  individual, Business team) billed monthly or annually. API access is bundled into the subscription,
  so cost allocation in this artifact tracks seats and team membership rather than per-request usage.'
sources:
  - https://todoist.com/pricing
  - https://developer.todoist.com/api/v1
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly or Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Todoist
  ServiceCategory: Productivity SaaS
  ProviderName: Todoist
  PublisherName: Doist Inc.
  InvoiceIssuerName: Doist Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Subscription
  PricingUnit: seat-month
meters:
  - name: pro_seat_month
    description: One Pro-tier user seat for one month. Annual billing applies a 20% discount.
    unit: seat-month
    aggregation: sum
    dimensions:
      - billing_cycle
      - currency
  - name: business_seat_month
    description: One Business-tier user seat (team member or guest) for one month.
    unit: seat-month
    aggregation: sum
    dimensions:
      - billing_cycle
      - team
      - role
  - name: team_projects_active
    description: Count of active team projects (capped at 500 per Business team) for capacity tracking.
    unit: project
    aggregation: max
    dimensions:
      - team
  - name: tax
    description: Local tax applied to Business seats per the customer's jurisdiction.
    unit: month
    aggregation: sum
    dimensions:
      - jurisdiction
principles:
  - name: Visibility
    description: Pull invoices and seat counts from the Todoist Business admin console; reconcile against
      the Pro/Business seat counts your team actually uses each month.
  - name: Allocation
    description: Use Business team workspaces and team folders to group seats by department or product;
      Todoist supports centralized billing per team so chargeback can be done team-by-team.
  - name: Optimization
    description: Move heavy users from Pro to Business when team collaboration features are needed; convert
      monthly subscriptions to annual on the Pro plan to capture the documented 20% discount; downgrade
      idle Pro accounts to Beginner.
  - name: Accountability
    description: Designate a workspace admin per Business team to own seat additions, role assignments,
      and the activity log review.
maintainers:
