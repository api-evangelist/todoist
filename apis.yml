apis:
  - aid: todoist:todoist-api
    name: Todoist API
    description: The Todoist API v1 provides programmatic access to Todoist task management, projects, sections, labels, reminders,
      comments, workspaces, and more. Supports OAuth 2.0 and personal API tokens for authentication. Includes incremental sync
      via the /sync endpoint for efficient client-server data synchronization.
    humanURL: https://developer.todoist.com/api/v1/
