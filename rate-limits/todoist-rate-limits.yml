specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Todoist
providerId: todoist
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Productivity
  - Tasks
  - Task Management
  - Collaboration
  - Rate Limiting
description: Todoist's developer documentation acknowledges rate limits exist and references a "Request
  limits" section, but exact per-second/per-minute thresholds are not exposed in the public reference.
  The OAuth dynamic client registration and metadata document endpoints are explicitly described as rate
  limited per caller. The API returns standard 429/500/503 status codes. Per-account/per-token limits
  apply; consult the live docs or response headers for the authoritative numbers.
sources:
  - https://developer.todoist.com/api/v1
responseCodes:
  throttled: 429
  serverError: 500
  serviceUnavailable: 503
limits:
  - name: Sync & REST API request limits
    scope: account
    metric: varies
    limit: see https://developer.todoist.com/api/v1 (Request limits section)
    notes: Documentation references a Request Limits section; exact RPS/RPM values not published in the
      public OpenAPI reference. Limits scope to the authenticated user/account.
  - name: OAuth dynamic client registration
    scope: caller
    metric: varies
    limit: rate limited per caller
    notes: '/oauth/register rejects too many registrations in a short period; retry later.'
  - name: OAuth client metadata document fetch
    scope: caller
    metric: varies
    limit: rate limited per caller
    notes: Too many metadata document fetches in a short period are rejected.
policies:
  - name: Standard 429 Handling
    description: A 429 Too Many Requests response indicates the user has sent too many requests in a given
      amount of time; clients should back off before retrying.
  - name: Refresh Token Rotation
    description: Refresh tokens are rotated on every successful refresh, with a 60-second grace window
      to distinguish legitimate retries from replay attempts.
  - name: Consult Response Headers
    description: Because exact thresholds are not published, applications should observe rate-limit headers
      on responses and treat any 429 as authoritative for their account.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
