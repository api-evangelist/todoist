specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Todoist
providerId: todoist
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Productivity
  - Tasks
  - Task Management
  - Collaboration
  - SaaS
description: Todoist sells a tiered SaaS subscription with three published plans (Beginner / Pro / Business)
  priced per user. Annual billing carries a 20% discount on the Pro plan. The same Todoist account credentials
  used for the apps authenticate the public REST, Sync, and v1 APIs; API access is included in every plan
  rather than separately metered. Specific dollar amounts are not exposed on the pricing page in machine-readable
  form and must be confirmed in the customer's local currency at checkout.
sources:
  - https://todoist.com/pricing
  - https://developer.todoist.com/api/v1
plans:
  - id: todoist-beginner
    name: Beginner
    type: freemium
    description: Always-free personal plan with 5 personal projects, Smart Quick Add, reminders, list
      and board layouts, 3 filter views, 1 week of activity history, and email/calendar integration. Includes
      API access using the user's own Todoist credentials.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Personal Projects
        name: personal_projects
        type: quota
        metric: project
        limit: 5
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Filter Views
        name: filter_views
        type: quota
        metric: filter
        limit: 3
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Activity History
        name: activity_history
        type: quota
        metric: week
        limit: 1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Smart Quick Add
      - name: Task Reminders
      - name: List & Board Layouts
      - name: Email & Calendar Integration
      - name: Limited Ramble Sessions
      - name: Todoist API
      - name: Todoist REST API v2
      - name: Todoist Sync API v9
  - id: todoist-pro
    name: Pro
    type: subscription
    description: Per-user subscription for power individuals. Adds 300 personal projects, calendar layout,
      task duration, custom reminders, 150 filter views, full reporting history, Task Assist, deadlines,
      and unlimited Ramble. Annual billing is 20% off the monthly rate. Specific list price not exposed
      on the public pricing page.
    entries:
      - label: Subscription (per user, billed monthly)
        name: subscription_monthly
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://todoist.com/pricing
        userMultiplied: true
      - label: Subscription (per user, billed annually)
        name: subscription_annual
        type: subscription
        metric: seat
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: see https://todoist.com/pricing (20% off when billed yearly)
        userMultiplied: true
      - label: Personal Projects
        name: personal_projects
        type: quota
        metric: project
        limit: 300
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Filter Views
        name: filter_views
        type: quota
        metric: filter
        limit: 150
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Calendar Layout
      - name: Task Duration
      - name: Custom Reminders
      - name: Full Reporting History
      - name: Task Assist
      - name: Deadlines
      - name: Unlimited Ramble
      - name: Todoist API
      - name: Todoist REST API v2
      - name: Todoist Sync API v9
  - id: todoist-business
    name: Business
    type: subscription
    description: Per-user team plan, billed per user/month plus local tax. Up to 1,000 team members and
      guests, 250 people per team project, up to 500 team projects. Adds shared workspace, granular activity
      logs, shared templates, team folders, roles & permissions, centralized billing, and SOC 2 Type II
      certification. Specific list price not exposed on the public pricing page.
    entries:
      - label: Subscription (per user/month)
        name: subscription_monthly
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://todoist.com/pricing (plus local tax)
        userMultiplied: true
      - label: Team Members & Guests (cap)
        name: team_members_cap
        type: quota
        metric: seat
        limit: 1000
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: People per Team Project
        name: people_per_team_project
        type: quota
        metric: seat
        limit: 250
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Team Projects
        name: team_projects
        type: quota
        metric: project
        limit: 500
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Shared Team Workspace
      - name: Granular Activity Logs
      - name: Shared Templates
      - name: Team Project Folders
      - name: Team Roles & Permissions
      - name: Centralized Billing
      - name: SOC 2 Type II Certification
      - name: Todoist API
      - name: Todoist REST API v2
      - name: Todoist Sync API v9
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
